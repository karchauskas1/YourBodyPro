server {
    server_name app.pasekaproduction.ru;

    root /opt/yourbody-pro/webapp/frontend/dist;
    index index.html;
    client_max_body_size 15M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 15M;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    listen 443 ssl;
    # Operational fallback: public HTTPS/443 currently times out on this VPS,
    # while 8443 is reachable and is used by Telegram WebApp links.
    listen 8443 ssl;
    ssl_certificate /etc/letsencrypt/live/app.pasekaproduction.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.pasekaproduction.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = app.pasekaproduction.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name app.pasekaproduction.ru;
    return 404;
}
